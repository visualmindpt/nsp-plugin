version: '3.8'

services:
  # API Server - Serviço principal de predição
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nsp-plugin-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./models:/app/models:ro  # Read-only models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - MAX_WORKERS=4
      - ENABLE_MONITORING=true
      - ENABLE_CACHE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nsp-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Monitoring Service - Prometheus (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: nsp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - nsp-network
    profiles:
      - monitoring  # Opcional, ativar com --profile monitoring

  # Grafana Dashboard (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: nsp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - nsp-network
    profiles:
      - monitoring  # Opcional
    depends_on:
      - prometheus

  # Redis Cache (opcional, para melhor performance)
  redis:
    image: redis:7-alpine
    container_name: nsp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - nsp-network
    profiles:
      - cache  # Opcional
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  nsp-network:
    driver: bridge

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
